format = """
[Ō¢æŌ¢ÆŌ¢ō](#2F2F2F)\
$username\
[ŌØ»](fg:color_primary bg:color_dark_grey)\
$shlvl\
[ŌØ»](fg:color_primary bg:color_dark_grey)\
$directory\
[ŌØ»](fg:color_primary bg:color_dark_grey)\
$cmd_duration\
[ŌØ»](fg:color_primary bg:color_dark_grey)\
$git_branch\
$git_commit\
$git_metrics\
$git_state\
[Ņé┤](fg:color_dark_grey)
$character"""

# Disable the blank line at the start of the prompt
# add_newline = false

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_bright_green = '#2FDA4E'
color_bright_red = '#E84855'
color_dark_grey = '#2F2F2F'
color_primary = '#FFAF00'
color_secondary = '#FAFAFA'

[character]
success_symbol = '[’äĀ ](fg:color_secondary)'
error_symbol = '[’äĀ ](fg:color_primary)'
format = '$symbol '
disabled = false

# You can also replace your username with a neat symbol like ’äĀ  or disable this
# and use the os module below
[username]
show_always = true
style_user = 'fg:color_secondary bg:color_dark_grey'
style_root = 'fg:color_secondary bg:color_dark_grey'
format = '[’ŖĮ ](fg:color_primary bg:color_dark_grey)[ $user ]($style)'
disabled = false

[shlvl]
disabled = false
style = 'fg:color_secondary bg:color_dark_grey'
format = '[ ’āē ](fg:color_primary bg:color_dark_grey)[ $symbol$shlvl ]($style)'
repeat = true
symbol = ':'
threshold = 0

[directory]
style = 'fg:color_secondary bg:color_dark_grey'
format = '[ ’ü╗ ](fg:color_primary bg:color_dark_grey)[ $path ]($style)'
truncation_length = 0
truncate_to_repo = false
truncation_symbol = 'ŌĆ”/'

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░łÖ’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░łÖ " = " ¾░łÖ’ä¬ "

[git_branch]
disabled = false
symbol = '[’éø](fg:color_primary bg:color_dark_grey)  ’Éś'
style = 'fg:color_secondary bg:color_dark_grey'
format = '[ $symbol $branch ]($style)'

[git_commit]
disabled = false
style = 'fg:color_secondary bg:color_dark_grey'
format = '[\($hash$tag\) ]($style)'
only_detached = false

[git_metrics]
disabled = false
added_style = 'fg:color_bright_green bg:color_dark_grey'
deleted_style = 'fg:color_bright_red bg:color_dark_grey'
only_nonzero_diffs = false
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

[git_state]
disabled = false
style = 'bg:color_dark_grey'
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[cmd_duration]
disabled = false
style = 'fg:color_secondary bg:color_dark_grey'
min_time = 0
show_milliseconds = true
format = '[ ’ēÆ ](fg:color_primary bg:color_dark_grey)[ $duration ]($style)'
